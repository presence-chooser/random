<!DOCTYPE html>
<html lang="en"><head>

        .history-chip{padding:1px 6px;border-radius:8px;font-size:8px;font-family:'Courier New',monospace;white-space:nowrap}

    </style>
</head>

<script>
// ============================================
// ZERO DAY + MATHEMATICAL SHUFFLE ENGINE
// WITH SMOOTH BACKWARD PLAYBACK
// ============================================

class UltimateShuffleEngine {
    constructor(videoElement) {
        this.video = videoElement;
        this.isPlaying = false;
        this.isLooping = true;
        this.isMuted = false;
        this.dirShuffleEnabled = true;
        this.minFrames = 5;
        this.maxFrames = 30;
        this.currentFrameDuration = 30;
        this.fps = 30;
        this.speed = 1;
        this.shuffleMode = 'fibonacci';
        this.transitionType = 'fade';
        this.transitionSpeed = 400;
        this.segmentCount = 0;
        this.totalFrames = 0;
        this.history = [];
        this.maxHistory = 30;
        this.playedFrames = new Set();
        this.frameCoverage = new Set();
        this.timeoutId = null;
        this.transitionTimeoutId = null;
        this.isTransitioning = false;
        this.lastFrameTime = performance.now();
        this.smoothnessScore = 100;
        this.entropyScore = 0;
        this.frameTimes = [];
        this.frameCountHistory = [];
        this.directionHistory = [];
        this.currentDirection = 1;
        this.isBackwardPlaying = false;
        this.backwardInterval = null;
        this.backwardStartTime = 0;
        this.backwardEndTime = 0;
        
        // Mathematical state variables
        this.mathState = {
            fibIndex: 1,
            fibPrev: 0,
            fibCurr: 1,
            lucasPrev: 2,
            lucasCurr: 1,
            collatzNum: 0,
            mandelbrotIter: 0,
            sierpinskiLevel: 0,
            pascalRow: 0,
            sieveIndex: 0,
            primeIndex: 0,
            piIndex: 0,
            eIndex: 0,
            goldenSeed: 0.1,
            chaosState: 0.5,
            lcgSeed: Date.now() % 2147483647,
            mersenneSeed: Date.now() % 2147483647
        };
        
        // Zero Day states
        this.s = {
            chronosTime: 0,
            nexusDim: 0,
            paradoxStack: [],
            echoBuffer: [],
            ouroborosPos: 0,
            singularityDensity: 0,
            voidState: 0,
            prismColor: 0,
            cascadeLevel: 0,
            mirrorReflection: 0,
            photonPath: 0,
            gravityMass: 0,
            quantumEntanglement: Array.from({length:10}, () => Math.random()),
            tachyonSpeed: 0,
            braneDim: 0
        };
        
        this.primeCache = [];
        this.generatePrimes(10000);
        
        this.video.src = '1.mp4';
        this.video.load();
        
        this.setupEventListeners();
        this.setupControls();
        this.updateUI();
    }
    
    generatePrimes(limit) {
        const sieve = new Uint8Array(limit + 1);
        this.primeCache = [];
        for (let i = 2; i <= limit; i++) {
            if (!sieve[i]) {
                this.primeCache.push(i);
                for (let j = i * i; j <= limit; j += i) sieve[j] = 1;
            }
        }
    }
    
    setupEventListeners() {
        this.video.addEventListener('loadedmetadata', () => {
            this.totalFrames = Math.floor(this.video.duration * this.fps);
            this.updateUI();
            this.updateStatus('🔥 Zero Day + Mathematical Shuffles Ready');
        });
        this.video.addEventListener('timeupdate', () => this.updateUI());
        this.video.addEventListener('play', () => { this.lastFrameTime = performance.now(); });
    }
    
    setupControls() {
        document.getElementById('toggleBtn').addEventListener('click', () => this.togglePlay());
        document.getElementById('skipBtn').addEventListener('click', () => this.skip());
        document.getElementById('resetBtn').addEventListener('click', () => this.reset());
        document.getElementById('loopBtn').addEventListener('click', () => this.toggleLoop());
        document.getElementById('muteBtn').addEventListener('click', () => this.toggleMute());
        document.getElementById('historyBtn').addEventListener('click', () => this.toggleHistory());
        document.getElementById('dirToggleBtn').addEventListener('click', () => this.toggleDirShuffle());
        
        document.getElementById('minFrameSlider').addEventListener('input', (e) => {
            this.minFrames = parseInt(e.target.value);
            if (this.minFrames > this.maxFrames) {
                this.maxFrames = this.minFrames;
                document.getElementById('maxFrameSlider').value = this.maxFrames;
                document.getElementById('maxFrameDisplay').textContent = this.maxFrames;
            }
            document.getElementById('minFrameDisplay').textContent = this.minFrames;
        });
        
        document.getElementById('maxFrameSlider').addEventListener('input', (e) => {
            this.maxFrames = parseInt(e.target.value);
            if (this.maxFrames < this.minFrames) {
                this.minFrames = this.maxFrames;
                document.getElementById('minFrameSlider').value = this.minFrames;
                document.getElementById('minFrameDisplay').textContent = this.minFrames;
            }
            document.getElementById('maxFrameDisplay').textContent = this.maxFrames;
        });
        
        document.getElementById('speedSelect').addEventListener('change', (e) => {
            this.speed = parseFloat(e.target.value);
            this.video.playbackRate = this.speed;
        });
        
        document.getElementById('shuffleMode').addEventListener('change', (e) => {
            this.shuffleMode = e.target.value;
            const names = {
                'fibonacci':'Fibonacci','prime':'Prime Numbers','pi':'Pi Digits','euler':"Euler's Number",
                'golden':'Golden Ratio','chaos':'Chaos Theory','mersenne':'Mersenne Twister','lcg':'LCG',
                'lucas':'Lucas Numbers','collatz':'Collatz Conjecture','mandelbrot':'Mandelbrot Set',
                'sierpinski':'Sierpinski Triangle','pascal':"Pascal's Triangle",'eratosthenes':'Eratosthenes Sieve',
                'chronos':'Chronos','nexus':'Nexus','paradox':'Paradox','echo':'Echo',
                'ouroboros':'Ouroboros','singularity':'Singularity','void':'Void','prism':'Prism',
                'cascade':'Cascade','mirror':'Mirror','photon':'Photon','gravity':'Gravity',
                'quantum_entanglement':'Quantum Entanglement','tachyon':'Tachyon','brane':'Brane'
            };
            document.getElementById('shuffleBadge').textContent = `🎲 ${names[this.shuffleMode] || this.shuffleMode}`;
            this.updateStatus(`🎲 Mode: ${names[this.shuffleMode] || this.shuffleMode}`);
            this.resetStates();
        });
        
        document.getElementById('transitionType').addEventListener('change', (e) => {
            this.transitionType = e.target.value;
        });
        
        document.getElementById('transitionSpeed').addEventListener('input', (e) => {
            this.transitionSpeed = parseInt(e.target.value);

            const percent = (e.clientX - rect.left) / rect.width;
            this.video.currentTime = percent * this.video.duration;
        });
    }
    
    resetStates() {

        this.mathState.pascalRow = 0;
        this.mathState.sieveIndex = 0;
        this.mathState.primeIndex = 0;
        this.mathState.piIndex = 0;
        this.mathState.eIndex = 0;
        this.mathState.goldenSeed = 0.1;
        this.mathState.chaosState = 0.5;
        this.s.chronosTime = 0;

    }
    
    // ============================================
    // MATHEMATICAL SHUFFLE ALGORITHMS (14 MODES)
    // ============================================
    
    getMathematicalValue(maxFrame) {
        const m = this.mathState;
        let value = 0;
        
        switch(this.shuffleMode) {
            case 'fibonacci':
                const next = (m.fibPrev + m.fibCurr) % maxFrame;
                m.fibPrev = m.fibCurr;
                m.fibCurr = next || 1;
                value = next / maxFrame;
                break;
                
            case 'prime':
                const prime = this.primeCache[m.primeIndex % this.primeCache.length] || 2;
                m.primeIndex++;
                value = (prime % maxFrame) / maxFrame;
                break;
                
            case 'pi':
                const piDigits = '31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679';
                const piIdx = m.piIndex % piDigits.length;
                m.piIndex++;
                value = parseInt(piDigits[piIdx]) / 10;
                break;
                
            case 'euler':
                const eDigits = '27182818284590452353602874713526624977572470936999595749669676277240766303535475945713821785251664274';
                const eIdx = m.eIndex % eDigits.length;
                m.eIndex++;
                value = parseInt(eDigits[eIdx]) / 10;
                break;
                
            case 'golden':
                const phi = (1 + Math.sqrt(5)) / 2;
                m.goldenSeed = (m.goldenSeed + phi) % 1;
                value = m.goldenSeed;
                break;
                
            case 'chaos':
                const r = 3.99;
                m.chaosState = r * m.chaosState * (1 - m.chaosState);
                value = m.chaosState;
                break;
                
            case 'mersenne':
                const ms1 = (m.mersenneSeed * 9301 + 49297) % 233280;
                const ms2 = (m.mersenneSeed * 48271 + 0) % 2147483647;
                m.mersenneSeed = (ms1 * ms2) % 2147483647;
                value = m.mersenneSeed / 2147483647;
                break;
                
            case 'lcg':
                const a = 1664525, c = 1013904223, mod = 4294967296;
                m.lcgSeed = (a * m.lcgSeed + c) % mod;
                value = m.lcgSeed / mod;
                break;
                
            case 'lucas':
                const lucasNext = m.lucasPrev + m.lucasCurr;
                m.lucasPrev = m.lucasCurr;
                m.lucasCurr = lucasNext % maxFrame;
                value = m.lucasCurr / maxFrame;
                break;
                
            case 'collatz':
                if (m.collatzNum === 0) m.collatzNum = Math.floor(Math.random() * maxFrame) + 1;
                if (m.collatzNum % 2 === 0) {
                    m.collatzNum = m.collatzNum / 2;
                } else {
                    m.collatzNum = 3 * m.collatzNum + 1;
                }
                if (m.collatzNum > maxFrame) m.collatzNum = m.collatzNum % maxFrame;
                if (m.collatzNum === 0) m.collatzNum = 1;
                value = m.collatzNum / maxFrame;
                break;
                
            case 'mandelbrot':
                const z = 0.5 + 0.5 * Math.sin(m.mandelbrotIter * 0.01);
                const cVal = 0.3 + 0.3 * Math.cos(m.mandelbrotIter * 0.015);
                const zNext = z * z + cVal;
                m.mandelbrotIter++;
                value = Math.abs(zNext) % 1;
                break;
                
            case 'sierpinski':
                const level = m.sierpinskiLevel % 10;
                const triangle = (level / 10) * (1 + Math.sin(level * 1.2));
                m.sierpinskiLevel++;
                value = triangle % 1;
                break;
                
            case 'pascal':
                const row = m.pascalRow % 15;
                const col = Math.floor(Math.random() * (row + 1));
                const binomial = this.binomial(row, col) % maxFrame;
                m.pascalRow++;
                value = binomial / maxFrame;
                break;
                
            case 'eratosthenes':
                const sieveIdx = m.sieveIndex % this.primeCache.length;
                const sievePrime = this.primeCache[sieveIdx] || 2;
                m.sieveIndex++;
                value = (sievePrime % maxFrame) / maxFrame;
                break;
                
            default:
                value = Math.random();
        }
        
        return Math.min(1, Math.max(0, value));
    }
    
    binomial(n, k) {
        if (k === 0 || k === n) return 1;
        let result = 1;
        for (let i = 1; i <= k; i++) {
            result = result * (n - i + 1) / i;
        }
        return Math.round(result);
    }
    
    // ============================================
    // ZERO DAY SHUFFLE ALGORITHMS (15 MODES)
    // ============================================
    
    getZeroDayValue(maxFrame) {
        const s = this.s;
        let value = 0;
        
        switch(this.shuffleMode) {
            case 'chronos':
                s.chronosTime += 0.01;
                const dilation = 1 / (1 + Math.sin(s.chronosTime) * 0.5);
                value = (Math.sin(s.chronosTime * dilation * 10) + 1) / 2;
                break;
            case 'nexus':
                s.nexusDim = (s.nexusDim + 0.01) % 1;
                const dims = [s.nexusDim, (s.nexusDim * 1.618) % 1, (s.nexusDim * 2.718) % 1];
                value = (dims[0] + dims[1] + dims[2]) / 3;
                break;
            case 'paradox':
                if (s.paradoxStack.length === 0) s.paradoxStack.push(Math.random());
                const newP = (s.paradoxStack[s.paradoxStack.length - 1] + Math.random()) / 2;
                s.paradoxStack.push(newP);
                if (s.paradoxStack.length > 10) s.paradoxStack.shift();
                value = s.paradoxStack[s.paradoxStack.length - 1];
                break;
            case 'echo':
                const input = Math.random();
                s.echoBuffer.unshift(input);
                if (s.echoBuffer.length > 5) s.echoBuffer.pop();
                const sum = s.echoBuffer.reduce((a, b, i) => a + b * (1 / (i + 1)), 0);
                value = Math.min(1, sum / 2);
                break;
            case 'ouroboros':
                s.ouroborosPos = (s.ouroborosPos + 0.01) % 1;
                const snake = Math.sin(s.ouroborosPos * Math.PI * 2);
                value = (snake + 1) / 2;
                break;
            case 'singularity':
                s.singularityDensity += 0.001;
                value = 1 - 1 / (1 + s.singularityDensity);
                break;
            case 'void':
                s.voidState = (s.voidState + 0.01) % 1;
                value = (s.voidState < 0.5) ? 0 : 1;
                break;
            case 'prism':
                s.prismColor = (s.prismColor + 0.01) % 1;
                const colors = [s.prismColor, (s.prismColor + 0.33) % 1, (s.prismColor + 0.66) % 1];
                value = (colors[0] + colors[1] + colors[2]) / 3;
                break;
            case 'cascade':
                s.cascadeLevel = (s.cascadeLevel + 0.1) % 1;
                const cascades = [s.cascadeLevel, s.cascadeLevel * 1.5, s.cascadeLevel * 0.5];
                value = (cascades[0] + cascades[1] + cascades[2]) / 3;
                break;
            case 'mirror':
                s.mirrorReflection = (s.mirrorReflection + 0.01) % 1;
                value = 1 - Math.abs(s.mirrorReflection - 0.5) * 2;
                break;
            case 'photon':
                s.photonPath = (s.photonPath + 0.1) % 1;
                const wave = Math.sin(s.photonPath * Math.PI * 2);
                value = (wave + 1) / 2;
                break;
            case 'gravity':
                s.gravityMass += 0.001;
                const field = 1 - 1 / (1 + s.gravityMass * 2);
                value = (field * Math.sin(s.gravityMass * 10) + 1) / 2;
                break;
            case 'quantum_entanglement':
                const idx = Math.floor(Math.random() * s.quantumEntanglement.length);
                const partner = (idx + 1) % s.quantumEntanglement.length;
                const temp = s.quantumEntanglement[idx];
                s.quantumEntanglement[idx] = s.quantumEntanglement[partner];
                s.quantumEntanglement[partner] = temp;
                value = s.quantumEntanglement.reduce((a, b) => a + b, 0) / s.quantumEntanglement.length;
                break;
            case 'tachyon':
                s.tachyonSpeed = (s.tachyonSpeed + 0.01) % 1;
                const tachyons = [s.tachyonSpeed, (s.tachyonSpeed * 2) % 1, (s.tachyonSpeed * 3) % 1];
                value = (tachyons[0] + tachyons[1] + tachyons[2]) / 3;
                break;
            case 'brane':
                s.braneDim = (s.braneDim + 0.01) % 1;
                const branes = [s.braneDim, (s.braneDim * 1.5) % 1, (s.braneDim * 2.5) % 1];
                value = (branes[0] + branes[1] + branes[2]) / 3;
                break;
            default:
                value = Math.random();
        }
        return Math.min(1, Math.max(0, value));
    }
    
    // ============================================
    // MAIN SHUFFLE ENGINE
    // ============================================
    
    getShuffleValue(maxFrame) {
        const mathModes = ['fibonacci','prime','pi','euler','golden','chaos','mersenne','lcg','lucas','collatz','mandelbrot','sierpinski','pascal','eratosthenes'];
        const zeroDayModes = ['chronos','nexus','paradox','echo','ouroboros','singularity','void','prism','cascade','mirror','photon','gravity','quantum_entanglement','tachyon','brane'];
        
        if (mathModes.includes(this.shuffleMode)) {
            return this.getMathematicalValue(maxFrame);
        } else if (zeroDayModes.includes(this.shuffleMode)) {
            return this.getZeroDayValue(maxFrame);
        }
        return Math.random();
    }
    
    getRandomDirection() {
        if (!this.dirShuffleEnabled) return 1;
        return Math.random() < 0.5 ? 1 : -1;
    }
    
    showDirectionOverlay(direction) {
        const overlay = document.getElementById('directionOverlay');
        if (direction > 0) {
            overlay.textContent = '▶ FORWARD';
            overlay.className = 'direction-overlay forward show';
        } else {
            overlay.textContent = '◀ BACKWARD';
            overlay.className = 'direction-overlay backward show';
        }
        setTimeout(() => {
            overlay.classList.remove('show');
        }, 800);
    }
    
    getRandomFrameCount() {
        const shuffleVal = this.getShuffleValue(this.maxFrames - this.minFrames + 1);
        return Math.floor(shuffleVal * (this.maxFrames - this.minFrames + 1)) + this.minFrames;
    }
    
    getShuffleTime() {
        this.currentFrameDuration = this.getRandomFrameCount();
        this.frameCountHistory.push(this.currentFrameDuration);
        if (this.frameCountHistory.length > 50) this.frameCountHistory.shift();
        
        const maxStartFrame = Math.max(1, this.totalFrames - this.currentFrameDuration);
        if (maxStartFrame <= 0) return 0;
        
        const shuffleVal = this.getShuffleValue(maxStartFrame);
        let frame = Math.floor(shuffleVal * maxStartFrame);
        let attempts = 0;
        
        while (attempts < 30) {
            const recent = this.history.slice(0, 5).map(h => h.frame);
            const tooClose = recent.some(f => Math.abs(f - frame) < this.currentFrameDuration * 0.3);
            if (!tooClose && !this.playedFrames.has(frame)) break;
            const newShuffle = this.getShuffleValue(maxStartFrame);
            frame = Math.floor(newShuffle * maxStartFrame);
            attempts++;
        }
        
        if (attempts >= 30 && this.playedFrames.size > 0) {
            this.playedFrames.clear();
            const recent = this.history.slice(0, 3).map(h => h.frame);
            recent.forEach(f => this.playedFrames.add(f));
            const newShuffle = this.getShuffleValue(maxStartFrame);
            frame = Math.floor(newShuffle * maxStartFrame);
        }
        
        this.playedFrames.add(frame);
        this.frameCoverage.add(frame);
        this.calculateSmoothness();
        return frame / this.fps;
    }
    
    calculateSmoothness() {
        if (this.history.length < 3) { this.smoothnessScore = 100; return; }
        const gaps = [];
        for (let i = 1; i < this.history.length; i++) {
            gaps.push(Math.abs(this.history[i-1].frame - this.history[i].frame));
        }
        if (gaps.length === 0) { this.smoothnessScore = 100; return; }
        const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
        const variance = gaps.reduce((a, b) => a + Math.pow(b - avgGap, 2), 0) / gaps.length;
        const stdDev = Math.sqrt(variance);
        const maxStdDev = this.totalFrames / 4;
        const normalized = Math.min(1, stdDev / maxStdDev);
        this.smoothnessScore = Math.max(0, 100 - normalized * 80);
        
        if (this.history.length > 10) {
            const bins = 20;
            const hist = new Array(bins).fill(0);
            this.history.slice(0, 20).forEach(h => {
                const bin = Math.floor((h.frame / this.totalFrames) * bins);
                if (bin < bins) hist[bin]++;
            });
            let entropy = 0;
            const total = this.history.slice(0, 20).length;
            hist.forEach(count => {
                if (count > 0) { const p = count / total; entropy -= p * Math.log2(p); }
            });
            const maxEntropy = Math.log2(bins);
            this.entropyScore = (entropy / maxEntropy) * 100;
        }
    }
    
    applyTransition(callback) {
        if (this.isTransitioning) { if (callback) callback(); return; }
        this.isTransitioning = true;
        const overlay = document.getElementById('transitionOverlay');
        const types = ['fade', 'blur', 'crossfade'];
        let type = this.transitionType === 'random' ? types[Math.floor(Math.random() * 3)] : this.transitionType;
        
        overlay.className = 'transition-overlay';
        if (type === 'fade') overlay.style.background = '#000';
        else if (type === 'blur') overlay.style.backdropFilter = 'blur(0px)';
        else if (type === 'crossfade') overlay.style.background = 'rgba(0,0,0,0)';
        
        overlay.style.transition = `opacity ${this.transitionSpeed}ms ease, backdrop-filter ${this.transitionSpeed}ms ease`;
        requestAnimationFrame(() => overlay.classList.add('active'));
        
        setTimeout(() => { if (callback) callback(); }, this.transitionSpeed / 2);
        if (this.transitionTimeoutId) clearTimeout(this.transitionTimeoutId);
        this.transitionTimeoutId = setTimeout(() => {
            overlay.classList.remove('active');
            overlay.style.backdropFilter = 'blur(0px)';
            setTimeout(() => { this.isTransitioning = false; }, 50);
        }, this.transitionSpeed + 50);
    }
    
    // ============================================
    // SMOOTH BACKWARD PLAYBACK USING TIMEUPDATE
    // ============================================
    
    playBackwardSegment(startTime, duration, callback) {
        const endTime = startTime + duration;
        this.backwardStartTime = startTime;
        this.backwardEndTime = endTime;
        
        // Seek to end of segment
        this.video.currentTime = endTime;
        this.video.playbackRate = 1;
        this.video.play();
        this.isBackwardPlaying = true;
        
        // Use timeupdate event to step backward smoothly
        const step = 1 / this.fps;
        const interval = step * 1000 / this.speed;
        let current = endTime;
        
        if (this.backwardInterval) clearInterval(this.backwardInterval);
        
        this.backwardInterval = setInterval(() => {
            if (!this.isBackwardPlaying || !this.isPlaying) {
                clearInterval(this.backwardInterval);
                this.backwardInterval = null;
                return;
            }
            
            current -= step;
            if (current <= startTime) {
                clearInterval(this.backwardInterval);
                this.backwardInterval = null;
                this.isBackwardPlaying = false;
                this.video.pause();
                if (callback) callback();
                return;
            }
            this.video.currentTime = current;
        }, interval);
        
        // Update stats
        this.segmentCount++;
        const now = performance.now();
        if (this.lastFrameTime > 0) {
            const delta = now - this.lastFrameTime;
            this.frameTimes.push(1000 / delta);
            if (this.frameTimes.length > 50) this.frameTimes.shift();
        }
        this.lastFrameTime = now;
        
        this.addHistory(startTime, Math.floor(startTime * this.fps));
        const modeName = document.getElementById('shuffleMode').selectedOptions[0].text;
        this.updateStatus(`🔥 ${modeName} ← BACKWARD | Seg ${this.segmentCount}: ${startTime.toFixed(2)}s (${this.currentFrameDuration}f)`);
        this.updateUI();
    }
    
    // ============================================
    // PLAY RANDOM SEGMENT
    // ============================================
    
    playRandomSegment() {
        if (!this.video.duration || !this.isPlaying) return;
        if (this.timeoutId) clearTimeout(this.timeoutId);
        
        this.currentDirection = this.getRandomDirection();
        const dirText = this.currentDirection > 0 ? '→ FORWARD' : '← BACKWARD';
        document.getElementById('dirDisplay').textContent = this.currentDirection > 0 ? '→' : '←';
        document.getElementById('dirDisplay').className = 'value ' + (this.currentDirection > 0 ? 'green' : 'red');
        document.getElementById('dirBadge').textContent = this.currentDirection > 0 ? '→ FORWARD' : '← BACKWARD';
        document.getElementById('dirBadge').className = 'badge ' + (this.currentDirection > 0 ? 'green' : 'red');
        
        this.showDirectionOverlay(this.currentDirection);
        
        const startTime = this.getShuffleTime();
        const frameTime = Math.floor(startTime * this.fps);
        const duration = this.currentFrameDuration / this.fps;
        
        this.applyTransition(() => {
            if (this.currentDirection > 0) {
                // FORWARD - normal play
                this.video.currentTime = startTime;
                this.video.playbackRate = this.speed;
                this.video.play();
                
                this.segmentCount++;
                const now = performance.now();
                if (this.lastFrameTime > 0) {
                    const delta = now - this.lastFrameTime;
                    this.frameTimes.push(1000 / delta);
                    if (this.frameTimes.length > 50) this.frameTimes.shift();
                }
                this.lastFrameTime = now;
                
                this.addHistory(startTime, frameTime);
                const modeName = document.getElementById('shuffleMode').selectedOptions[0].text;
                this.updateStatus(`🔥 ${modeName} → FORWARD | Seg ${this.segmentCount}: ${startTime.toFixed(2)}s (${this.currentFrameDuration}f)`);
                this.updateUI();
                this.video.play();
            } else {
                // BACKWARD - smooth reverse playback
                this.playBackwardSegment(startTime, duration, () => {
                    if (this.isPlaying) {
                        this.playRandomSegment();
                    }
                });
                return;
            }
        });
        
        if (this.currentDirection > 0) {
            const totalDuration = (duration * 1000) / this.speed;
            this.timeoutId = setTimeout(() => {
                if (this.isPlaying) {
                    this.playRandomSegment();
                }
            }, totalDuration + 100);
        }
    }
    
    addHistory(startTime, frame) {
        const isMath = ['fibonacci','prime','pi','euler','golden','chaos','mersenne','lcg','lucas','collatz','mandelbrot','sierpinski','pascal','eratosthenes'].includes(this.shuffleMode);
        this.history.unshift({
            start: startTime,
            frame: frame,
            frameCount: this.currentFrameDuration,
            shuffleMode: this.shuffleMode,
            direction: this.currentDirection,
            isMath: isMath
        });
        this.directionHistory.push(this.currentDirection);
        if (this.directionHistory.length > 100) this.directionHistory.shift();
        if (this.history.length > this.maxHistory) this.history.pop();
        this.updateHistoryUI();
    }
    
    togglePlay() {
        this.isPlaying = !this.isPlaying;
        const btn = document.getElementById('toggleBtn');
        if (this.isPlaying) {
            btn.innerHTML = '<span>⏸</span> Pause';
            btn.classList.add('active');
            document.getElementById('status').classList.add('playing');
            this.lastFrameTime = performance.now();
            this.video.play();
            this.playRandomSegment();
        } else {
            btn.innerHTML = '<span>▶</span> Play';
            btn.classList.remove('active');
            document.getElementById('status').classList.remove('playing');
            if (this.timeoutId) clearTimeout(this.timeoutId);
            if (this.transitionTimeoutId) clearTimeout(this.transitionTimeoutId);
            if (this.backwardInterval) {
                clearInterval(this.backwardInterval);
                this.backwardInterval = null;
                this.isBackwardPlaying = false;
            }
            this.video.pause();
            this.video.playbackRate = this.speed;
            this.updateStatus('⏸ Paused');
        }
    }
    
    skip() {
        if (!this.isPlaying) {
            this.isPlaying = true;
            const btn = document.getElementById('toggleBtn');
            btn.innerHTML = '<span>⏸</span> Pause';
            btn.classList.add('active');
            document.getElementById('status').classList.add('playing');
            this.lastFrameTime = performance.now();
            this.video.play();
            this.playRandomSegment();
        } else {
            if (this.timeoutId) clearTimeout(this.timeoutId);
            if (this.backwardInterval) {
                clearInterval(this.backwardInterval);
                this.backwardInterval = null;
                this.isBackwardPlaying = false;
            }
            this.video.pause();
            this.video.playbackRate = this.speed;
            this.playRandomSegment();
        }
    }
    
    reset() {
        this.isPlaying = false;
        this.segmentCount = 0;
        this.history = [];
        this.playedFrames = new Set();
        this.frameCoverage = new Set();
        this.frameTimes = [];
        this.frameCountHistory = [];
        this.directionHistory = [];
        this.smoothnessScore = 100;
        this.entropyScore = 0;

        this.isTransitioning = false;
        this.currentDirection = 1;

        if (this.timeoutId) clearTimeout(this.timeoutId);

    toggleLoop() {

    toggleHistory() {
        const panel = document.getElementById('historyPanel');
        const btn = document.getElementById('historyBtn');
        if (panel.style.display === 'none') {
            panel.style.display = 'flex';
            btn.classList.add('active');
            this.updateHistoryUI();
        } else {
            panel.style.display = 'none';
            btn.classList.remove('active');
        }
    }
    
    toggleDirShuffle() {
        this.dirShuffleEnabled = !this.dirShuffleEnabled;
        document.getElementById('dirToggleBtn').classList.toggle('active');
        this.updateStatus(`↕ Direction Shuffle ${this.dirShuffleEnabled ? 'ON' : 'OFF'}`);
    }
    
    updateStatus(message) { document.getElementById('status').textContent = message; }
    
    updateUI() {
        document.getElementById('timeDisplay').textContent = `${this.video.currentTime.toFixed(2)}s`;
        document.getElementById('segmentCount').textContent = this.segmentCount;
        document.getElementById('currentFrames').textContent = `${this.currentFrameDuration}f`;
        const progress = this.video.duration ? (this.video.currentTime / this.video.duration * 100) : 0;
        document.getElementById('progressFill').style.width = `${progress}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
        document.getElementById('fpsBadge').textContent = `📊 ${this.fps} FPS`;
        document.getElementById('smoothnessBadge').textContent = `📈 ${Math.round(this.smoothnessScore)}%`;
        document.getElementById('frameCountBadge').textContent = `📐 ${this.currentFrameDuration}f`;
        document.getElementById('entropyDisplay').textContent = this.entropyScore.toFixed(2);
        document.getElementById('entropyBar').style.width = `${Math.min(100, this.entropyScore)}%`;
        const coverage = this.totalFrames > 0 ? (this.frameCoverage.size / Math.max(1, this.totalFrames) * 100) : 0;
        document.getElementById('coverageBar').style.width = `${Math.min(100, coverage)}%`;
        if (this.frameCountHistory.length > 0) {
            const avg = this.frameCountHistory.reduce((a, b) => a + b, 0) / this.frameCountHistory.length;
            const variety = Math.min(100, (avg / this.maxFrames) * 100);
            document.getElementById('shuffleBar').style.width = `${variety}%`;
        }
        const totalDir = this.directionHistory.length;
        if (totalDir > 0) {
            const forwardCount = this.directionHistory.filter(d => d > 0).length;
            const ratio = (forwardCount / totalDir) * 100;
            document.getElementById('dirBar').style.width = `${ratio}%`;
        }
    }
    
    updateHistoryUI() {
        const container = document.getElementById('historyChips');
        container.innerHTML = '';
        const names = {
            'fibonacci':'Fib','prime':'Pr','pi':'Pi','euler':'Eu','golden':'Go','chaos':'Ch',
            'mersenne':'Me','lcg':'LC','lucas':'Lu','collatz':'Co','mandelbrot':'Ma',
            'sierpinski':'Si','pascal':'Pa','eratosthenes':'Er',
            'chronos':'Chr','nexus':'Nx','paradox':'Pd','echo':'Ec',
            'ouroboros':'Or','singularity':'Sg','void':'Vd','prism':'Pr',
            'cascade':'Ca','mirror':'Mi','photon':'Ph','gravity':'Gr',
            'quantum_entanglement':'QE','tachyon':'Ta','brane':'Br'
        };
        this.history.slice(0, 20).forEach((h, index) => {
            const chip = document.createElement('span');
            const dirText = h.direction > 0 ? '→' : '←';
            chip.className = `history-chip ${h.direction > 0 ? 'forward' : 'backward'}`;
            if (h.isMath) chip.classList.add('math');
            if (index === 0) chip.classList.add('current');
            chip.textContent = `${dirText} ${names[h.shuffleMode]||'?'} ${h.frame} (${h.frameCount}f)`;
            container.appendChild(chip);
        });
        if (this.history.length === 0) {
            const empty = document.createElement('span');
            empty.style.cssText = 'color:#444;font-size:10px';
            empty.textContent = 'No segments yet';
            container.appendChild(empty);
        }
    }
}
