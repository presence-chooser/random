<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Prime + Bimodal Smooth Shuffle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .player-wrapper {
            background: linear-gradient(145deg, rgba(20, 20, 40, 0.95), rgba(10, 10, 20, 0.98));
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 1200px;
            width: 100%;
        }

        #videoContainer {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9);
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Status Overlay */
        .stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            pointer-events: none;
        }

        .badge-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .badge.prime-badge {
            background: rgba(156, 39, 176, 0.25);
            border-color: rgba(156, 39, 176, 0.4);
            color: #CE93D8;
            animation: primeGlow 2.5s ease-in-out infinite;
        }

        .badge.bimodal-badge {
            background: rgba(255, 152, 0, 0.2);
            border-color: rgba(255, 152, 0, 0.3);
            color: #FFB74D;
            animation: bimodalGlow 3s ease-in-out infinite;
        }

        .badge.smooth-badge {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.3);
            color: #8BC34A;
            animation: smoothPulse 2s ease-in-out infinite;
        }

        @keyframes primeGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(156, 39, 176, 0.1); }
            50% { box-shadow: 0 0 40px rgba(156, 39, 176, 0.25); }
        }

        @keyframes bimodalGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 152, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 152, 0, 0.2); }
        }

        @keyframes smoothPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(76, 175, 80, 0.1); }
            50% { box-shadow: 0 0 40px rgba(76, 175, 80, 0.2); }
        }

        /* Progress */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 0 12px 8px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: height 0.2s ease;
        }

        .progress-track:hover {
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #CE93D8, #FFB74D, #CE93D8, #FFB74D);
            background-size: 300% 100%;
            animation: smoothShimmer 4s ease-in-out infinite;
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        @keyframes smoothShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Controls */
        .controls-wrapper {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .controls-row button {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.04);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 60px;
            justify-content: center;
        }

        .controls-row button:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .controls-row button:active {
            transform: scale(0.95);
        }

        .controls-row button.primary {
            background: linear-gradient(135deg, #7B1FA2, #4A148C);
            border-color: #7B1FA2;
            color: white;
            box-shadow: 0 4px 20px rgba(123, 31, 162, 0.2);
        }

        .controls-row button.primary:hover {
            box-shadow: 0 6px 30px rgba(123, 31, 162, 0.3);
        }

        .controls-row button.primary.active {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            border-color: #f44336;
            box-shadow: 0 4px 20px rgba(244, 67, 54, 0.3);
        }

        .controls-row button.secondary {
            background: rgba(255, 152, 0, 0.12);
            border-color: rgba(255, 152, 0, 0.15);
            color: #FFB74D;
        }

        .controls-row button.warning {
            background: rgba(255, 193, 7, 0.12);
            border-color: rgba(255, 193, 7, 0.15);
            color: #FFD54F;
        }

        .controls-row button.warning.active {
            background: rgba(255, 193, 7, 0.2);
            border-color: #FFC107;
            box-shadow: 0 4px 20px rgba(255, 193, 7, 0.15);
        }

        .controls-row button.danger {
            background: rgba(244, 67, 54, 0.12);
            border-color: rgba(244, 67, 54, 0.15);
            color: #EF5350;
        }

        .controls-row button.purple {
            background: rgba(156, 39, 176, 0.12);
            border-color: rgba(156, 39, 176, 0.15);
            color: #CE93D8;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-group label {
            color: #888;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .option-group .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-group input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .option-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7B1FA2, #CE93D8);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(123, 31, 162, 0.2);
            transition: all 0.2s ease;
        }

        .option-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .option-group select {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            font-family: 'Courier New', monospace;
        }

        .option-group select:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .option-group select:focus {
            outline: none;
            border-color: #7B1FA2;
        }

        .option-value {
            min-width: 40px;
            text-align: center;
            color: #CE93D8;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        /* Info Bar */
        .info-bar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            align-items: center;
        }

        #status {
            color: #a8d8ea;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border-left: 3px solid #CE93D8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #status.playing {
            border-left-color: #FFB74D;
            animation: statusPulse 1.5s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .stats-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
        }

        .stat-item .value {
            color: #CE93D8;
            font-weight: 600;
        }

        .stat-item .value.glow {
            color: #FFB74D;
        }

        .stat-item .value.warm {
            color: #8BC34A;
        }

        /* Distribution Visualization */
        .dist-viz {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 8px;
        }

        .dist-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dist-item .label {
            color: #555;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .dist-bar-container {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .dist-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7B1FA2, #CE93D8);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .dist-bar-fill.bimodal-1 {
            background: linear-gradient(90deg, #7B1FA2, #9C27B0);
        }

        .dist-bar-fill.bimodal-2 {
            background: linear-gradient(90deg, #FF6F00, #FFB74D);
        }

        .dist-bar-fill.coverage {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
        }

        /* History */
        .history-panel {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-height: 60px;
            overflow-y: auto;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .history-panel::-webkit-scrollbar {
            height: 4px;
        }

        .history-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
        }

        .history-panel::-webkit-scrollbar-thumb {
            background: #7B1FA2;
            border-radius: 2px;
        }

        .history-chip {
            padding: 2px 10px;
            background: rgba(123, 31, 162, 0.15);
            border: 1px solid rgba(123, 31, 162, 0.2);
            border-radius: 12px;
            font-size: 10px;
            color: #CE93D8;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            animation: chipIn 0.3s ease;
        }

        .history-chip.current {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.2);
            color: #FFB74D;
        }

        @keyframes chipIn {
            from { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .history-label {
            color: #555;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .player-wrapper { padding: 16px; }
            .controls-row button { padding: 8px 12px; font-size: 11px; min-width: 40px; }
            .options-grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
            .info-bar { grid-template-columns: 1fr; }
            .stats-grid { justify-content: flex-start; }
            .stat-item { font-size: 10px; padding: 3px 8px; }
            .stats-overlay { top: 10px; left: 10px; right: 10px; }
            .badge { font-size: 9px; padding: 4px 10px; }
            .dist-viz { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            .controls-row { gap: 4px; }
            .controls-row button { padding: 6px 8px; font-size: 10px; min-width: 30px; }
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <!-- Video Container -->
        <div id="videoContainer">
            <video id="videoPlayer" muted="" src="VID_20240329_021151_HSR_120.mp4"></video>
            
            <!-- Stats Overlay -->
            <div class="stats-overlay">

    <script>
        class PrimeBimodalPlayer {
            constructor(videoElement) {
                this.video = videoElement;
                this.isPlaying = false;
                this.isLooping = true;
                this.isMuted = false;
                this.frameDuration = 30;
                this.fps = 30;
                this.speed = 1;
                this.primeMode = 'balanced';
                this.bimodalBalance = 0.5;
                this.segmentCount = 0;
                this.totalFramesPlayed = 0;
                this.totalTime = 0;
                this.timeoutId = null;
                this.totalFrames = 0;
                this.history = [];
                this.maxHistory = 50;
                this.playedFrames = new Set();
                this.frameCoverage = new Set();
                
                // Prime state
                this.primeCache = [];
                this.primeIndex = 0;
                this.primePairIndex = 0;
                this.lastPrime = 0;
                
                // Bimodal state
                this.peak1 = 0.3;  // First peak position (30%)
                this.peak2 = 0.7;  // Second peak position (70%)
                this.spread = 0.15;
                
                // Stats
                this.frameTimes = [];
                this.lastFrameTime = performance.now();
                this.smoothnessScore = 100;
                this.entropyHistory = [];

                // Load video
                this.video.src = 'VID_20240329_021151_HSR_120.mp4';
                this.video.load();

                this.setupEventListeners();
                this.setupControls();
                this.generatePrimes(10000);
                this.updateUI();
                this.updateVisualizations();
            }

            setupEventListeners() {
                this.video.addEventListener('loadedmetadata', () => {
                    this.totalFrames = Math.floor(this.video.duration * this.fps);
                    this.updateUI();
                    this.updateStatus('✅ Prime+Bimodal engine ready');
                    this.updateVisualizations();
                });

                this.video.addEventListener('timeupdate', () => {
                    this.updateUI();
                });

                this.video.addEventListener('play', () => {
                    this.lastFrameTime = performance.now();
                });
            }

            setupControls() {
                document.getElementById('toggleBtn').addEventListener('click', () => this.togglePlay());
                document.getElementById('skipBtn').addEventListener('click', () => this.skip());
                document.getElementById('resetBtn').addEventListener('click', () => this.reset());
                document.getElementById('loopBtn').addEventListener('click', () => this.toggleLoop());
                document.getElementById('muteBtn').addEventListener('click', () => this.toggleMute());
                document.getElementById('historyBtn').addEventListener('click', () => this.toggleHistory());

                document.getElementById('frameSlider').addEventListener('input', (e) => {
                    this.frameDuration = parseInt(e.target.value);
                    document.getElementById('frameDisplay').textContent = this.frameDuration;
                    this.updateStatus(`🎬 Frames: ${this.frameDuration}`);
                });

                document.getElementById('speedSelect').addEventListener('change', (e) => {
                    this.speed = parseFloat(e.target.value);
                    this.video.playbackRate = this.speed;
                    this.updateStatus(`⚡ Speed: ${this.speed}x`);
                });

                document.getElementById('primeMode').addEventListener('change', (e) => {
                    this.primeMode = e.target.value;
                    this.primeIndex = 0;
                    this.primePairIndex = 0;
                    this.updateStatus(`🔢 Prime Mode: ${e.target.value}`);
                    this.updateVisualizations();
                });

                document.getElementById('balanceSlider').addEventListener('input', (e) => {
                    this.bimodalBalance = parseInt(e.target.value) / 100;
                    document.getElementById('balanceDisplay').textContent = `${Math.round(this.bimodalBalance * 100)}%`;
                    this.updateVisualizations();
                    this.updateStatus(`⚖️ Balance: ${Math.round(this.bimodalBalance * 100)}%`);
                });

                document.getElementById('progressTrack').addEventListener('click', (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    this.video.currentTime = percent * this.video.duration;
                });
            }

            // ============ PRIME NUMBER GENERATION ============

            generatePrimes(limit) {
                const sieve = new Uint8Array(limit + 1);
                this.primeCache = [];
                for (let i = 2; i <= limit; i++) {
                    if (!sieve[i]) {
                        this.primeCache.push(i);
                        for (let j = i * i; j <= limit; j += i) {
                            sieve[j] = 1;
                        }
                    }
                }
            }

            getPrimePairs() {
                const pairs = [];
                const primes = this.primeCache;
                
                switch(this.primeMode) {
                    case 'twin':
                        // Twin primes: difference of 2
                        for (let i = 0; i < primes.length - 1; i++) {
                            if (primes[i+1] - primes[i] === 2) {
                                pairs.push([primes[i], primes[i+1]]);
                            }
                        }
                        break;
                    case 'cousin':
                        // Cousin primes: difference of 4
                        for (let i = 0; i < primes.length - 1; i++) {
                            if (primes[i+1] - primes[i] === 4) {
                                pairs.push([primes[i], primes[i+1]]);
                            }
                        }
                        break;
                    case 'sexy':
                        // Sexy primes: difference of 6
                        for (let i = 0; i < primes.length - 1; i++) {
                            if (primes[i+1] - primes[i] === 6) {
                                pairs.push([primes[i], primes[i+1]]);
                            }
                        }
                        break;
                    case 'strong':
                        // Strong primes: > average of neighbors
                        for (let i = 1; i < primes.length - 1; i++) {
                            const avg = (primes[i-1] + primes[i+1]) / 2;
                            if (primes[i] > avg) {
                                pairs.push([primes[i-1], primes[i]]);
                            }
                        }
                        break;
                    default:
                        // Balanced primes
                        for (let i = 1; i < primes.length - 1; i++) {
                            const avg = (primes[i-1] + primes[i+1]) / 2;
                            if (primes[i] === avg) {
                                pairs.push([primes[i-1], primes[i]]);
                            }
                        }
                }
                
                return pairs.length > 0 ? pairs : [[primes[0] || 2, primes[1] || 3]];
            }

            // ============ BIMODAL DISTRIBUTION ============

            getBimodalValue(maxFrame) {
                // Generate value using bimodal distribution with prime influence
                const pairs = this.getPrimePairs();
                if (pairs.length === 0) return Math.floor(Math.random() * maxFrame);
                
                // Use prime pair index
                const pair = pairs[this.primePairIndex % pairs.length];
                this.primePairIndex++;
                
                // Use prime values to influence distribution
                const prime1 = pair[0] % 100;
                const prime2 = pair[1] % 100;
                
                // Determine which peak to use based on prime parity and balance
                const usePeak1 = (prime1 % 2 === 0) ? 
                    (Math.random() < this.bimodalBalance) : 
                    (Math.random() > this.bimodalBalance);
                
                // Generate value around selected peak
                let value;
                if (usePeak1) {
                    // Peak 1: around 30%
                    value = this.peak1 + (prime1 / 100) * this.spread;
                } else {
                    // Peak 2: around 70%
                    value = this.peak2 + (prime2 / 100) * this.spread;
                }
                
                // Add some prime-based jitter for smoothness
                const jitter = ((prime1 + prime2) % 100) / 1000;
                value += jitter;
                
                // Clamp and scale
                value = Math.max(0, Math.min(1, value));
                return Math.floor(value * maxFrame);
            }

            // ============ SMOOTH RANDOM GENERATOR ============

            getSmoothShuffleTime() {
                const maxStartFrame = Math.max(1, this.totalFrames - this.frameDuration);
                if (maxStartFrame <= 0) return 0;

                let frame = this.getBimodalValue(maxStartFrame);
                let attempts = 0;
                
                // Ensure we don't repeat too closely
                while (attempts < 50) {
                    const recentFrames = this.history.slice(0, 5).map(h => h.frame);
                    const tooClose = recentFrames.some(f => Math.abs(f - frame) < this.frameDuration * 0.5);
                    
                    if (!tooClose && !this.playedFrames.has(frame)) {
                        break;
                    }
                    
                    frame = this.getBimodalValue(maxStartFrame);
                    attempts++;
                }
                
                // If we couldn't find a good frame, reset played set
                if (attempts >= 50 && this.playedFrames.size > 0) {
                    this.playedFrames.clear();
                    const recent = this.history.slice(0, 5).map(h => h.frame);
                    recent.forEach(f => this.playedFrames.add(f));
                    frame = this.getBimodalValue(maxStartFrame);
                }
                
                const frameTime = frame / this.fps;
                this.playedFrames.add(frame);
                this.frameCoverage.add(frame);
                
                // Calculate smoothness
                this.calculateSmoothness();
                
                return frameTime;
            }

            // ============ SMOOTHNESS CALCULATION ============

            calculateSmoothness() {
                if (this.history.length < 3) {
                    this.smoothnessScore = 100;
                    return;
                }
                
                // Calculate variance of gaps between segments
                const gaps = [];
                for (let i = 1; i < this.history.length; i++) {
                    gaps.push(Math.abs(this.history[i-1].frame - this.history[i].frame));
                }
                
                if (gaps.length === 0) {
                    this.smoothnessScore = 100;
                    return;
                }
                
                const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
                const variance = gaps.reduce((a, b) => a + Math.pow(b - avgGap, 2), 0) / gaps.length;
                const stdDev = Math.sqrt(variance);
                
                // Normalize: lower stdDev = smoother
                const maxStdDev = this.totalFrames / 4;
                const normalized = Math.min(1, stdDev / maxStdDev);
                this.smoothnessScore = Math.max(0, 100 - normalized * 80);
                
                // Calculate entropy for additional smoothness metric
                if (this.history.length > 10) {
                    const bins = 20;
                    const hist = new Array(bins).fill(0);
                    this.history.slice(0, 20).forEach(h => {
                        const bin = Math.floor((h.frame / this.totalFrames) * bins);
                        if (bin < bins) hist[bin]++;
                    });
                    
                    let entropy = 0;
                    const total = this.history.slice(0, 20).length;
                    hist.forEach(count => {
                        if (count > 0) {
                            const p = count / total;
                            entropy -= p * Math.log2(p);
                        }
                    });
                    
                    const maxEntropy = Math.log2(bins);
                    const entropyNorm = entropy / maxEntropy;
                    
                    // Combine smoothness metrics
                    this.smoothnessScore = (this.smoothnessScore * 0.6 + (entropyNorm * 100) * 0.4);
                }
            }

            // ============ PLAYER LOGIC ============

            playRandomSegment() {
                if (!this.video.duration || !this.isPlaying) return;

                if (this.timeoutId) {
                    clearTimeout(this.timeoutId);
                    this.timeoutId = null;
                }

                this.video.pause();

                const startTime = this.getSmoothShuffleTime();
                const frameTime = Math.floor(startTime * this.fps);
                this.video.currentTime = startTime;

                const duration = this.frameDuration / this.fps;
                const endTime = startTime + duration;

                this.segmentCount++;
                this.totalFramesPlayed += this.frameDuration;
                this.totalTime += duration;

                // Measure FPS
                const now = performance.now();
                if (this.lastFrameTime > 0) {
                    const delta = now - this.lastFrameTime;
                    this.frameTimes.push(1000 / delta);
                    if (this.frameTimes.length > 100) this.frameTimes.shift();
                }
                this.lastFrameTime = now;

                // Add to history
                this.addHistory(startTime, endTime, frameTime);

                const primeMode = document.getElementById('primeMode').value;
                const balance = Math.round(this.bimodalBalance * 100);
                this.updateStatus(`🔢 ${primeMode} | ⚖️ ${balance}% | Seg ${this.segmentCount}: ${startTime.toFixed(2)}s (${frameTime})`);
                this.updateUI();
                this.updateVisualizations();

                this.video.playbackRate = this.speed;
                this.video.play();

                this.timeoutId = setTimeout(() => {
                    this.video.pause();
                    if (this.isPlaying) {
                        this.playRandomSegment();
                    }
                }, (duration * 1000) / this.speed);
            }

            addHistory(startTime, endTime, frame) {
                this.history.unshift({
                    start: startTime,
                    end: endTime,
                    frame: frame,
                    primeMode: this.primeMode,
                    balance: this.bimodalBalance
                });

                if (this.history.length > this.maxHistory) {
                    this.history.pop();
                }

                this.updateHistoryUI();
            }

            togglePlay() {
                this.isPlaying = !this.isPlaying;
                const btn = document.getElementById('toggleBtn');

                if (this.isPlaying) {
                    btn.innerHTML = '<span>⏸</span> Pause';
                    btn.classList.add('active');
                    document.getElementById('status').classList.add('playing');
                    this.lastFrameTime = performance.now();
                    this.playRandomSegment();
                } else {
                    btn.innerHTML = '<span>▶</span> Play';
                    btn.classList.remove('active');
                    document.getElementById('status').classList.remove('playing');
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                        this.timeoutId = null;
                    }
                    this.video.pause();
                    this.updateStatus('⏸ Paused');
                }
            }

            skip() {
                if (!this.isPlaying) {
                    this.isPlaying = true;
                    const btn = document.getElementById('toggleBtn');
                    btn.innerHTML = '<span>⏸</span> Pause';
                    btn.classList.add('active');
                    document.getElementById('status').classList.add('playing');
                    this.lastFrameTime = performance.now();
                    this.playRandomSegment();
                } else {
                    if (this.timeoutId) {
                        clearTimeout(this.timeoutId);
                        this.timeoutId = null;
                    }
                    this.video.pause();
                    this.playRandomSegment();
                }
            }

            reset() {
                this.isPlaying = false;
                this.segmentCount = 0;
                this.totalFramesPlayed = 0;
                this.totalTime = 0;
                this.history = [];
                this.playedFrames = new Set();
                this.frameCoverage = new Set();
                this.frameTimes = [];
                this.primeIndex = 0;
                this.primePairIndex = 0;
                this.smoothnessScore = 100;

                if (this.timeoutId) {
                    clearTimeout(this.timeoutId);
                    this.timeoutId = null;
                }

                this.video.pause();
                this.video.currentTime = 0;

                const btn = document.getElementById('toggleBtn');
                btn.innerHTML = '<span>▶</span> Play';
                btn.classList.remove('active');
                document.getElementById('status').classList.remove('playing');

                this.updateStatus('⟳ Reset complete');
                this.updateUI();
                this.updateHistoryUI();
                this.updateVisualizations();
            }

            toggleLoop() {
                this.isLooping = !this.isLooping;
                const btn = document.getElementById('loopBtn');
                if (this.isLooping) {
                    btn.classList.add('active');
                    this.updateStatus('🔁 Loop ON');
                } else {
                    btn.classList.remove('active');
                    this.updateStatus('🔁 Loop OFF');
                }
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                this.video.muted = this.isMuted;
                const btn = document.getElementById('muteBtn');
                btn.innerHTML = this.isMuted ? '<span>🔇</span> Unmute' : '<span>🔊</span> Mute';
            }

            toggleHistory() {
                const panel = document.getElementById('historyPanel');
                const btn = document.getElementById('historyBtn');
                if (panel.style.display === 'none') {
                    panel.style.display = 'flex';
                    btn.classList.add('active');
                    this.updateHistoryUI();
                } else {
                    panel.style.display = 'none';
                    btn.classList.remove('active');
                }
            }

            updateStatus(message) {
                document.getElementById('status').textContent = message;
            }

            updateUI() {
                document.getElementById('timeDisplay').textContent = `${this.video.currentTime.toFixed(2)}s`;
                const currentFrame = Math.floor(this.video.currentTime * this.fps);
                document.getElementById('frameInfo').textContent = `${currentFrame}/${this.totalFrames}`;
                document.getElementById('segmentCount').textContent = this.segmentCount;
                document.getElementById('segmentBadge').textContent = `🎯 ${this.segmentCount}`;
                
                const progress = this.video.duration ? (this.video.currentTime / this.video.duration * 100) : 0;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
                document.getElementById('fpsBadge').textContent = `📊 ${this.fps} FPS`;
                document.getElementById('smoothnessBadge').textContent = `📈 ${Math.round(this.smoothnessScore)}%`;
            }

            updateVisualizations() {
                // Update peak bars based on balance
                const peak1Width = 20 + (this.bimodalBalance * 50);
                const peak2Width = 20 + ((1 - this.bimodalBalance) * 50);
                document.getElementById('peak1Bar').style.width = `${peak1Width}%`;
                document.getElementById('peak2Bar').style.width = `${peak2Width}%`;

                // Coverage
                const coverage = this.totalFrames > 0 ? 
                    (this.frameCoverage.size / Math.max(1, this.totalFrames - this.frameDuration) * 100) : 0;
                document.getElementById('coverageBar').style.width = `${Math.min(100, coverage)}%`;

                // Smoothness
                document.getElementById('smoothnessBar').style.width = `${this.smoothnessScore}%`;
            }

            updateHistoryUI() {
                const container = document.getElementById('historyChips');
                container.innerHTML = '';
                
                this.history.slice(0, 20).forEach((h, index) => {
                    const chip = document.createElement('span');
                    chip.className = 'history-chip';
                    if (index === 0) chip.classList.add('current');
                    const modeMap = {
                        'twin': 'T',
                        'cousin': 'C',
                        'sexy': 'S',
                        'balanced': 'B',
                        'strong': 'St'
                    };
                    chip.textContent = `${modeMap[h.primeMode]||'?'} ${h.frame}`;
                    container.appendChild(chip);
                });

                if (this.history.length === 0) {
                    const empty = document.createElement('span');
                    empty.style.color = '#444';
                    empty.style.fontSize = '11px';
                    empty.textContent = 'No segments played yet';
                    container.appendChild(empty);
                }
            }
        }

        // Initialize
        const video = document.getElementById('videoPlayer');
        const player = new PrimeBimodalPlayer(video);
    </script>
